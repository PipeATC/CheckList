  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Optima','Optima Nova','Segoe UI',Candara,'Gill Sans',sans-serif;background:#f0f4f8;color:#1a2535;min-height:100vh;overflow-x:hidden;text-transform:uppercase;letter-spacing:0.04em;}
    /* Reset uppercase for input fields */
    input,textarea{text-transform:none;letter-spacing:normal;font-family:'Optima','Optima Nova','Segoe UI',Candara,'Gill Sans',sans-serif;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0a0e14;} ::-webkit-scrollbar-thumb{background:#1e2a3a;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px currentColor;}50%{box-shadow:0 0 20px currentColor;}}
    @keyframes scanline{0%{top:-10%;}100%{top:110%;}}
    .slide-up{animation:slideUp 0.3s ease;}
    /* Military green theme */
    body.mil-green{background:#0d1208;color:#b8c9a0;}
    body.mil-green::-webkit-scrollbar-track{background:#0d1208;}
    body.mil-green::-webkit-scrollbar-thumb{background:#2a3a1e;}
    /* White theme */
    body.white-mode{background:#f0f4f8;color:#1a2535;}
    body.white-mode::-webkit-scrollbar-track{background:#e0e8f0;}
    body.white-mode::-webkit-scrollbar-thumb{background:#aabbcc;}
  </style>

const SETTINGS_KEY = "flightChecklistSettings";
const DEFAULT_SETTINGS = {whiteMode:true,milGreen:false,autoAdvance:true,floatDone:true,lang:"en"};

function normalizeLang(lang){
  if(lang==="fr") return "es";
  return lang==="es" ? "es" : "en";
}

function uiLang(settings){ return normalizeLang(settings?.lang); }
function uiT(settings){ return T[uiLang(settings)] || T.en; }
function checklistFor(ac, settings){
  return ac.checklists[uiLang(settings)] || ac.checklists.en;
}

function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(!raw) return {...DEFAULT_SETTINGS};
    const saved = JSON.parse(raw);
    return {...DEFAULT_SETTINGS,...saved,lang:normalizeLang(saved.lang)};
  }catch{
    return {...DEFAULT_SETTINGS};
  }
}

function langLabel(settings){
  return uiLang(settings)==="en" ? "EN" : "ES";
}

// ── SETTINGS CONTEXT ───────────────────────────────────────────────────────
const SettingsCtx = React.createContext(null);

// ── SETTINGS PANEL ─────────────────────────────────────────────────────────
function SettingsPanel({onClose,settings,setSettings}){
  const lang = uiLang(settings);
  const t = uiT(settings);
  const bg = settings.milGreen ? "#1a2210" : settings.whiteMode ? "#fff" : "#0d1624";
  const border = settings.milGreen ? "#3a5020" : settings.whiteMode ? "#d0dde8" : "#1e2a3a";
  const text = settings.milGreen ? "#b8c9a0" : settings.whiteMode ? "#1a2535" : "#c8d6e5";
  const accent = settings.milGreen ? "#8fbc5a" : "#4FC3F7";

  const toggle = (k) => setSettings(s=>({...s,[k]:!s[k]}));
  const setLang = (l) => setSettings(s=>({...s,lang:normalizeLang(l)}));

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
         onClick={onClose}>
      <div className="slide-up" onClick={e=>e.stopPropagation()}
           style={{background:bg,borderTop:`2px solid ${accent}`,padding:"20px 20px 32px",
                   boxShadow:"0 -8px 32px #0006",maxHeight:"70vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:14,letterSpacing:4,color:accent,fontWeight:"bold"}}>{t.settingsTitle}</div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:text,fontSize:22,cursor:"pointer",padding:"2px 6px"}}>✕</button>
        </div>

        {/* Language */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,letterSpacing:3,color:accent,marginBottom:8}}>{t.lang.toUpperCase()}</div>
          <div style={{display:"flex",gap:8}}>
            {["en","es"].map(l=>(
              <button key={l} onClick={()=>setLang(l)}
                      style={{flex:1,padding:"10px 0",background:lang===l?accent+"22":"transparent",
                              border:`1px solid ${lang===l?accent:border}`,
                              color:lang===l?accent:text,fontSize:15,cursor:"pointer",borderRadius:4,letterSpacing:2}}>
                {l==="en"?"EN":"ES"}
              </button>
            ))}
          </div>
        </div>

        {/* Toggles */}
        {[
          {k:"whiteMode",label:t.whiteMode},
          {k:"milGreen",label:t.milGreen},
          {k:"autoAdvance",label:t.autoAdvance},
          {k:"floatDone",label:t.floatDone},
        ].map(({k,label})=>(
          <div key={k} onClick={()=>toggle(k)}
               style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                       padding:"13px 14px",marginBottom:8,cursor:"pointer",
                       background:settings[k]?accent+"14":"transparent",
                       border:`1px solid ${settings[k]?accent:border}`,borderRadius:5,transition:"all 0.15s"}}>
            <span style={{fontSize:15,color:text,letterSpacing:1}}>{label}</span>
            <div style={{width:42,height:24,borderRadius:12,background:settings[k]?accent:"#1e2a3a",
                         position:"relative",transition:"background 0.2s",border:`1px solid ${settings[k]?accent:border}`}}>
              <div style={{position:"absolute",top:3,left:settings[k]?21:3,width:16,height:16,
                           borderRadius:"50%",background:settings[k]?bg:"#4a6080",transition:"left 0.2s"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CUSTOM CHECKLIST BUILDER ───────────────────────────────────────────────
function CustomBuilder({onClose,editId,customLists,setCustomLists,settings}){
  const t = uiT(settings);
  const existing = editId ? customLists.find(c=>c.id===editId) : null;
  const [name,setName] = useState(existing?.name||"");
  const [phases,setPhases] = useState(existing?.phases||[{name:"CHECKLIST",items:[""]}]);
  const [activeP,setActiveP] = useState(0);

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const panelBg = settings.milGreen?"#1a2210":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#3a5020":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const accent = settings.milGreen?"#8fbc5a":"#4FC3F7";
  const dim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";

  const addPhase = ()=>{
    setPhases(ps=>[...ps,{name:"NEW PHASE",items:[""]}]);
    setActiveP(phases.length);
  };
  const removePhase = (i)=>{
    if(phases.length<=1)return;
    const np = phases.filter((_,idx)=>idx!==i);
    setPhases(np);
    setActiveP(Math.min(i,np.length-1));
  };
  const updatePhaseName = (i,v)=>setPhases(ps=>ps.map((p,idx)=>idx===i?{...p,name:v.toUpperCase()}:p));
  const updateItem = (pi,ii,v)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.map((it,iix)=>iix===ii?v:it)}:p));
  const addItem = (pi)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:[...p.items,""]}:p));
  const removeItem = (pi,ii)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.filter((_,iix)=>iix!==ii)}:p));

  const save = ()=>{
    if(!name.trim())return;
    const entry = {id:editId||Date.now().toString(),name:name.trim(),phases,color:"#4FC3F7",icon:"✅"};
    if(editId){
      setCustomLists(ls=>ls.map(l=>l.id===editId?entry:l));
    } else {
      setCustomLists(ls=>[...ls,entry]);
    }
    onClose();
  };

  const p = phases[activeP]||phases[0];

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 14px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"transparent",border:`1px solid ${border}`,color:dim,padding:"5px 10px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.back}</button>
        <input value={name} onChange={e=>setName(e.target.value)}
               placeholder={t.checklistName}
               style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                       padding:"6px 10px",borderRadius:4,fontSize:13,fontFamily:"Courier New",outline:"none",letterSpacing:1}}/>
        <button onClick={save} style={{background:accent+"22",border:`1px solid ${accent}`,color:accent,
                                        padding:"6px 12px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.save}</button>
      </div>

      {/* Phase tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:4,padding:"8px 14px",borderBottom:`1px solid ${border}`,flexShrink:0,
                   scrollbarWidth:"none"}}>
        {phases.map((ph,i)=>(
          <button key={i} onClick={()=>setActiveP(i)}
                  style={{flexShrink:0,padding:"4px 8px",background:i===activeP?accent+"18":"transparent",
                          border:`1px solid ${i===activeP?accent:border}`,color:i===activeP?accent:dim,
                          fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3,whiteSpace:"nowrap",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>
            {ph.name||"PHASE"}
          </button>
        ))}
        <button onClick={addPhase} style={{flexShrink:0,padding:"4px 8px",background:"transparent",
                border:`1px dashed ${dim}`,color:dim,fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3}}>
          +
        </button>
      </div>

      {/* Phase edit */}
      <div style={{flex:1,overflow:"auto",padding:"10px 14px"}}>
        {p && (
          <>
            <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
              <input value={p.name} onChange={e=>updatePhaseName(activeP,e.target.value)}
                     placeholder={t.phaseName}
                     style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:accent,
                             padding:"5px 8px",borderRadius:3,fontSize:10,fontFamily:"Courier New",letterSpacing:2,outline:"none"}}/>
              {phases.length>1&&(
                <button onClick={()=>removePhase(activeP)}
                        style={{background:"transparent",border:`1px solid #FF174444`,color:"#FF1744",
                                padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:10}}>✕</button>
              )}
            </div>
            {p.items.map((item,ii)=>(
              <div key={ii} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                <div style={{width:16,height:16,border:`1px solid ${border}`,borderRadius:2,flexShrink:0}}/>
                <input value={item} onChange={e=>updateItem(activeP,ii,e.target.value)}
                       placeholder={t.itemText}
                       style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                               padding:"5px 8px",borderRadius:3,fontSize:11,fontFamily:"Courier New",outline:"none"}}/>
                <button onClick={()=>removeItem(activeP,ii)}
                        style={{background:"transparent",border:"none",color:dim,cursor:"pointer",fontSize:13,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>addItem(activeP)}
                    style={{width:"100%",marginTop:4,padding:"6px 0",background:"transparent",
                            border:`1px dashed ${dim}`,color:dim,fontSize:10,cursor:"pointer",
                            borderRadius:3,letterSpacing:1}}>
              {t.addItem}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

          </div>
          <button onClick={()=>setEditId(cl.id)}
                  style={{background:"transparent",border:`1px solid ${border}`,color:dim,
                          padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:9,letterSpacing:1}}>{t.editChecklist}</button>
          <button onClick={()=>setConfirmDel(cl.id)}

                          padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:9}}>✕</button>
        </div>
      ))}

      {confirmDel&&(
        <div style={{position:"fixed",inset:0,zIndex:300,background:"#0009",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:cardBg,border:`1px solid ${border}`,borderRadius:8,padding:24,maxWidth:280,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:12,color:text,marginBottom:16,letterSpacing:1}}>{t.confirmDelete}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDel(null)} style={{flex:1,padding:"8px 0",background:"transparent",border:`1px solid ${border}`,color:dim,cursor:"pointer",borderRadius:4,fontSize:11}}>{t.cancel}</button>
              <button onClick={()=>del(confirmDel)} style={{flex:1,padding:"8px 0",background:"#FF174414",border:"1px solid #FF1744",color:"#FF1744",cursor:"pointer",borderRadius:4,fontSize:11}}>{t.deleteChecklist}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CHECKLIST SCREEN ───────────────────────────────────────────────────────
function ChecklistScreen({aircraftId,onBack,settings,customLists}){
  const t = uiT(settings);
  const isCustom = customLists.some(c=>c.id===aircraftId);
  const customEntry = isCustom ? customLists.find(c=>c.id===aircraftId) : null;

  const ac = isCustom ? null : AIRCRAFT[aircraftId];
  const allPhases = isCustom
    ? Object.fromEntries(customEntry.phases.map(p=>[p.name,p.items.filter(i=>i.trim())]))
    : checklistFor(ac, settings);

  const phases = Object.keys(allPhases);
  const [activePhase,setActivePhase] = useState(phases[0]);
  const [checked,setChecked] = useState({});
  const [completing,setCompleting] = useState({});
  const [showSpeeds,setShowSpeeds] = useState(false);
  const tabsRef = useRef(null);

  const color = isCustom ? "#4FC3F7" : ac.color;
  const name = isCustom ? customEntry.name : ac.name;
  const reg = isCustom ? "" : ac.registration;

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const panelBg = settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accentSys = settings.milGreen?"#8fbc5a":"#4FC3F7";

  const items = allPhases[activePhase]||[];
  const accent = isCustom ? accentSys : phaseColor(activePhase);

  const [confirmed,setConfirmed] = useState({});

  const toggle = (phase,idx)=>{
    const key = `${phase}-${idx}`;
    const item = (allPhases[phase]||[])[idx];
    if(item&&item.startsWith("⚠"))return;
    const now = !checked[key];
    if(now){
      // Step 1: fill the checkbox immediately (completing = ticking)
      setCompleting(c=>({...c,[key]:true}));
      // Step 2: after short delay, confirm done (text strikethrough, row green)
      setTimeout(()=>{
        setChecked(c=>({...c,[key]:true}));
        setConfirmed(c=>({...c,[key]:true}));
        setCompleting(c=>{const n={...c};delete n[key];return n;});
      },250);
      // Auto-advance after confirmation
      if(settings.autoAdvance){
        setTimeout(()=>{
          const its = allPhases[phase]||[];
          const allDoneNow = its.every((_,i)=>i===idx||checked[`${phase}-${i}`]||_?.startsWith("⚠"));
          if(allDoneNow){
            const next = phases[phases.indexOf(phase)+1];
            if(next)setTimeout(()=>setActivePhase(next),400);
          }
        },300);
      }
    } else {
      setChecked(c=>({...c,[key]:false}));
      setConfirmed(c=>{const n={...c};delete n[key];return n;});
    }
  };

  const resetPhase = ()=>{
    const keys = items.map((_,i)=>`${activePhase}-${i}`);
    setChecked(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
    setConfirmed(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
  };

  const doneCount = items.filter((_,i)=>checked[`${activePhase}-${i}`]).length;
  const warnCount = items.filter(it=>it.startsWith("⚠")).length;
  const checkableCount = items.length - warnCount;
  const allDone = checkableCount>0 && doneCount>=checkableCount;

  let displayItems = items.map((it,i)=>({it,i}));
  if(settings.floatDone){
    const undone = displayItems.filter(({it,i})=>!checked[`${activePhase}-${i}`]&&!it.startsWith("⚠"));
    const done = displayItems.filter(({it,i})=>checked[`${activePhase}-${i}`]);
    const warn = displayItems.filter(({it})=>it.startsWith("⚠"));
    displayItems = [...warn,...undone,...done];
  }

  const hasReset = doneCount>0 && activePhase!=="EMERGENCIES" && activePhase!=="URGENCES";

  return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column"}}>
      {showSpeeds&&!isCustom&&ac.speedTable&&(
        <SpeedSheet speedTable={ac.speedTable} color={color} name={name} registration={reg}
                    onClose={()=>setShowSpeeds(false)} settings={settings}/>
      )}
      {/* Header */}
      <div style={{padding:"16px 16px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          {/* Left: back + reset stacked */}
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <button onClick={onBack} style={{background:"transparent",border:`1px solid ${border}`,color:textDim,
                                              padding:"8px 14px",borderRadius:5,cursor:"pointer",fontSize:14,letterSpacing:1}}>{t.back}</button>
            <button onClick={()=>{setChecked({});setCompleting({});setConfirmed({});}}
              style={{background:"transparent",border:`1px solid ${color}66`,color:color,
                      fontSize:11,padding:"5px 10px",borderRadius:4,cursor:"pointer",letterSpacing:1,textAlign:"center"}}>
              ↺ RESET
            </button>
          </div>
          <div style={{width:36,height:36,background:`${color}18`,border:`1px solid ${color}44`,borderRadius:5,
                       display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
            {isCustom?<UserLogo size={28} color={color}/>:(ac.icon||"✈")}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,letterSpacing:3,color,marginBottom:2}}>{isCustom?"CUSTOM":(ac.type.toUpperCase())}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:16,fontWeight:"bold",letterSpacing:1.5,color:text}}>{name}</div>
              {reg&&<div style={{fontSize:11,padding:"2px 7px",background:`${color}22`,border:`1px solid ${color}44`,borderRadius:3,color,letterSpacing:1}}>{reg}</div>}
            </div>
            {!isCustom&&ac.speedTable&&(
              <button onClick={()=>setShowSpeeds(true)}
                style={{marginTop:6,background:`${color}18`,border:`1px solid ${color}66`,color:color,
                        fontSize:13,padding:"6px 16px",borderRadius:5,cursor:"pointer",letterSpacing:1,flexShrink:0}}>
                ✈ SPEEDS
              </button>
            )}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:11,color:textDim,letterSpacing:2}}>{t.phase}</div>
            <div style={{fontSize:15,color:allDone?"#4CAF50":accent}}>{allDone?t.done:`${doneCount}/${checkableCount}`}</div>
          </div>
        </div>

        {/* Progress */}
        <div style={{height:4,background:`${border}`,borderRadius:2,marginBottom:10,overflow:"hidden"}}>
          <div style={{height:"100%",background:allDone?"#4CAF50":accent,
                       width:`${checkableCount>0?(doneCount/checkableCount)*100:0}%`,
                       transition:"width 0.3s",boxShadow:allDone?"0 0 8px #4CAF50":undefined}}/>
        </div>

        {/* Phase tabs */}
        <div ref={tabsRef} style={{display:"flex",overflowX:"auto",gap:5,scrollbarWidth:"none",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
          {phases.map(phase=>{
            const pColor = isCustom ? accentSys : phaseColor(phase);
            const isActive = phase===activePhase;
            const pItems = allPhases[phase]||[];
            const pWarn = pItems.filter(it=>it.startsWith("⚠")).length;
            const pDone = pItems.filter((_,i)=>checked[`${phase}-${i}`]).length;
            const pDoneAll = pItems.length-pWarn>0 && pDone>=(pItems.length-pWarn);
            return (
              <button key={phase} onClick={()=>setActivePhase(phase)}
                      style={{flexShrink:0,padding:"6px 12px",background:isActive?`${pColor}18`:"transparent",
                              border:`1px solid ${isActive?pColor:border}`,borderRadius:4,
                              color:isActive?pColor:textDim,fontSize:11,letterSpacing:1,cursor:"pointer",transition:"all 0.2s",
                              whiteSpace:"nowrap"}}>
                {pDoneAll?"✓ ":""}{phase}
              </button>
            );
          })}
        </div>
      </div>

      {/* Phase header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px 6px",flexShrink:0}}>
        <div style={{fontSize:13,letterSpacing:3,color:accent,fontWeight:"bold"}}>{activePhase}</div>
        {hasReset&&(
          <button onClick={resetPhase} style={{background:"transparent",border:`1px solid ${border}`,color:textDim,
                                               fontSize:11,padding:"5px 12px",borderRadius:4,cursor:"pointer",letterSpacing:1}}>
            {t.reset}
          </button>
        )}
      </div>

      {/* Items */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 24px"}}>
        {displayItems.map(({it,i})=>{
          const key = `${activePhase}-${i}`;
          const done = !!checked[key];
          const isWarn = it.startsWith("⚠");
          const isCompleting = !!completing[key];
          const isConfirmed = !!confirmed[key];
          return (
            <div key={i} onClick={()=>toggle(activePhase,i)}
                 style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",
                         marginBottom:6,borderRadius:5,cursor:isWarn?"default":"pointer",
                         background:isConfirmed?"#00ff8808":isCompleting?`${accent}10`:"transparent",
                         border:`1px solid ${isConfirmed?"#4CAF5022":isWarn?"#FF174422":border}`,
                         transition:"all 0.3s"}}>
              {!isWarn&&(
                <div style={{width:22,height:22,border:`2px solid ${(done||isCompleting)?"#4CAF50":accent+"66"}`,borderRadius:4,
                             flexShrink:0,background:(done||isCompleting)?"#4CAF50":"transparent",
                             display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",marginTop:1}}>
                  {(done||isCompleting)&&<span style={{color:"#000",fontSize:13,fontWeight:"bold",lineHeight:1}}>✓</span>}
                </div>
              )}
              {!isWarn&&<span style={{fontSize:12,color:textDim,width:22,flexShrink:0,letterSpacing:1,paddingTop:3,marginTop:1}}>{String(i+1).padStart(2,"0")}</span>}
              <span style={{fontSize:isWarn?14:15,letterSpacing:0.3,
                            color:isConfirmed?"#4CAF50":isWarn?"#FF5252":text,
                            textDecoration:isConfirmed?"line-through":"none",
                            transition:"all 0.3s",flex:1,lineHeight:1.6}}>
                {it}
              </span>
            </div>
          );
        })}
        {allDone&&(
          <div style={{marginTop:16,padding:"14px 20px",background:"#4CAF5014",border:"1px solid #4CAF5044",
                       borderRadius:5,textAlign:"center",color:"#4CAF50",fontSize:14,letterSpacing:3,animation:"fadeIn 0.4s ease"}}>
            ✓ {t.done}
          </div>
        )}
      </div>
    </div>
  );
}

          <div style={{fontSize:12,color:textDim,letterSpacing:1}}>{t.newChecklist}</div>
        </div>
        <div style={{fontSize:22,color:hov==="custom"?accent:border,transition:"all 0.2s"}}>›</div>
      </div>
    </div>
  );
}

// ── SELECTION SCREEN ───────────────────────────────────────────────────────
function SelectionScreen({aircraftType,onSelect,onBack,settings}){
  const t = uiT(settings);
  const [hovered,setHovered] = useState(null);
  const typeAircraft = Object.entries(AIRCRAFT).filter(([_,ac])=>ac.aircraftType===aircraftType);
  const meta = TYPE_META[aircraftType];

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const cardBg = settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accent = settings.milGreen?"#8fbc5a":meta.color;

  return (
    <div style={{minHeight:"100vh",background:bg,padding:"16px 14px 20px"}}>
      {/* Type header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${border}`,color:textDim,
                                          padding:"8px 14px",borderRadius:5,cursor:"pointer",fontSize:14,letterSpacing:1}}>{t.back}</button>
        <div style={{width:36,height:36,background:`${meta.color}18`,border:`1px solid ${meta.color}44`,
                     borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>
          {meta.icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,letterSpacing:3,color:accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.label.toUpperCase()}</div>
        </div>
      </div>

      {/* Aircraft list */}
      {typeAircraft.map(([id,ac])=>{
        const isHov = hovered===id;
        const cl = checklistFor(ac, settings);
        const phases = Object.keys(cl).length;
        const items = Object.values(cl).flat().length;
        return (
          <div key={id} onClick={()=>onSelect(id)}
               onMouseEnter={()=>setHovered(id)} onMouseLeave={()=>setHovered(null)}
               style={{background:cardBg,border:`1px solid ${isHov?ac.color:border}`,borderRadius:6,
                       padding:"12px 14px",marginBottom:8,cursor:"pointer",
                       boxShadow:isHov?`0 0 14px ${ac.color}33`:"none",transition:"all 0.2s",
                       display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:48,height:48,background:`${ac.color}18`,border:`1px solid ${ac.color}44`,borderRadius:7,
                         display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,
                         boxShadow:isHov?`0 0 14px ${ac.color}44`:"none",transition:"box-shadow 0.2s"}}>
              {ac.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                <div style={{fontSize:16,fontWeight:"bold",letterSpacing:1,color:isHov?ac.color:text,transition:"color 0.2s"}}>{ac.name}</div>
                <div style={{fontSize:11,padding:"2px 7px",background:`${ac.color}22`,border:`1px solid ${ac.color}44`,borderRadius:3,color:ac.color,letterSpacing:1}}>{ac.registration}</div>
              </div>
              <div style={{fontSize:12,color:textDim,marginTop:1}}>{ac.description}</div>
              {ac.version&&<div style={{fontSize:11,color:textDim,opacity:.7,marginTop:1}}>{ac.version}</div>}
              <div style={{display:"flex",gap:10,marginTop:5}}>
                <div style={{fontSize:13,color:ac.color}}>{phases} {t.phases}</div>
                <div style={{fontSize:12,color:textDim}}>{items} {t.items}</div>
              </div>
            </div>
            <div style={{fontSize:20,color:isHov?ac.color:border,transition:"all 0.2s",transform:isHov?"translateX(2px)":"none"}}>›</div>
          </div>
        );
      })}
    </div>
  );
}

// ── CUSTOM CHECKLIST SCREEN ────────────────────────────────────────────────
function CustomChecklistScreen({checklistId,onBack,settings,customLists}){
  const t = uiT(settings);
  const cl = customLists.find(c=>c.id===checklistId);
  if(!cl)return null;

  const phases = Object.fromEntries(cl.phases.map(p=>[p.name,p.items.filter(i=>i.trim())]));

  return (
    <ChecklistScreen aircraftId={checklistId} onBack={onBack} settings={settings} customLists={customLists}/>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [settings,setSettings] = useState(loadSettings);
  const [view,setView] = useState("home"); // home | type | checklist | custom
  const [selectedType,setSelectedType] = useState(null);
  const [selectedAc,setSelectedAc] = useState(null);
  const [customLists,setCustomLists] = useState([]);

  const updateSettings = (patch)=>{
    setSettings(prev=>{
      const next = typeof patch==="function" ? patch(prev) : {...prev,...patch};
      if(next.lang) next.lang = normalizeLang(next.lang);
      try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(next)); }catch{}
      return next;
    });
  };

  // Apply body class for theme
  useEffect(()=>{
    document.body.className = settings.milGreen?"mil-green":settings.whiteMode?"white-mode":"";
  },[settings.milGreen,settings.whiteMode]);

  // Force service worker update so cached French UI is replaced
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(reg=>reg.update());
    });
  },[]);

  const goChecklist = (id)=>{ setSelectedAc(id); setView("checklist"); };
  const selectType = (typeId)=>{
    setSelectedType(typeId);
    setView("type");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <TopBar settings={settings} setSettings={updateSettings}/>
      {view==="home" && (
        <HomeScreen
          settings={settings}
          onSelect={selectType}
          onCustom={()=>setView("custom")}
        />
      )}
      {view==="type" && (
        <SelectionScreen
          aircraftType={selectedType}
          settings={settings}
          onSelect={goChecklist}
          onBack={()=>setView("home")}
        />
      )}
      {view==="checklist" && (
        <ChecklistScreen
          aircraftId={selectedAc}
          settings={settings}
          customLists={customLists}
          onBack={()=>{
            const isCustom = customLists.some(c=>c.id===selectedAc);
            if(isCustom){ setView("custom"); return; }
            const ac = AIRCRAFT[selectedAc];
            const sameType = ac?.aircraftType
              ? Object.values(AIRCRAFT).filter(a=>a.aircraftType===ac.aircraftType)
              : [];
            if(sameType.length===1) setView("home");
            else { setSelectedType(ac.aircraftType); setView("type"); }
          }}
        />
      )}
      {view==="custom" && (
        <CustomScreen
          settings={settings}
          customLists={customLists}
          setCustomLists={setCustomLists}
          onBack={()=>setView("home")}
          onSelect={(id)=>{ setSelectedAc(id); setView("checklist"); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
// Register service worker for offline support
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js?v=6')
      .then(function(reg){
        reg.update();
        console.log('SW registered:', reg.scope);
      })
      .catch(function(err){ console.log('SW failed:', err); });
  });
}
</script>
</body>
</html>
